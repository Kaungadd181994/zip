name: Extract ZIP and Deploy to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto-Detect and Extract ZIP
        run: |
          # 1. Dynamically find ANY zip file name
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ ERROR: No .zip file found in the root directory!"
            exit 1
          fi
          
          echo "📦 Found ZIP file: $ZIP_FILE"
          mkdir -p ./extracted-site
          unzip "$ZIP_FILE" -d ./extracted-site
          
          # 2. Safety check: Fixes nested folder structures automatically
          if [ ! -f ./extracted-site/index.html ]; then
            SUBDIR=$(find ./extracted-site -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -n "$SUBDIR" ] && [ -f "$SUBDIR/index.html" ]; then
              echo "⚠️ Nested folder detected. Moving files to root..."
              mv "$SUBDIR"/* ./extracted-site/
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './extracted-site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
