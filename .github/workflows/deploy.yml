name: Extract ZIP and Commit to Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

# We need write permissions to push files back into the repository
permissions:
  contents: write

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-Detect and Extract ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ ERROR: No .zip file found!"
            exit 1
          fi
          
          echo "📦 Extracting $ZIP_FILE directly into the repository root..."
          # Unzips directly into the main folder
          unzip -o "$ZIP_FILE" -d ./
          
          # Optional: Delete the zip file after extraction so you don't keep both
          # rm "$ZIP_FILE"

      - name: Commit and Push Extracted Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Only commit if there are actually new/changed files to prevent errors
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Automation: Automatically extracted ZIP files"
            git push origin main
          fi
